# Vault Club — Render Blueprint
# Deploy: Dashboard → Blueprints → your instance → Sync (after pushing this file).
#
# Creates: PostgreSQL + Django API + Next.js web app.
# Celery + Redis are deferred (see docker-compose.yml).

databases:
  - name: vaultclub-db
    # plan omitted — pick Free or paid tier in the dashboard when creating the Blueprint
    databaseName: vaultclub
    user: vaultclub

services:
  - type: web
    name: vaultclub-api
    runtime: python
    rootDir: backend
    # plan omitted — pick Free or Starter in the dashboard when creating the Blueprint
    buildCommand: ./build.sh
    # Build has no access to Render private-network DB hostnames (dpg-*-a).
    preDeployCommand: python manage.py migrate --no-input
    # Inline command so a Blueprint/dashboard sync does not depend on start.sh +x.
    startCommand: >-
      python manage.py migrate --no-input &&
      gunicorn config.wsgi:application
      --bind 0.0.0.0:$PORT
      --workers ${WEB_CONCURRENCY:-2}
      --timeout 120
    healthCheckPath: /api/v1/health/
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.7"
      - key: DATABASE_URL
        fromDatabase:
          name: vaultclub-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: WEB_CONCURRENCY
        value: "2"
      # Wired from vaultclub-web after the frontend service exists (Blueprint sync).
      - key: CORS_ALLOWED_ORIGINS
        fromService:
          type: web
          name: vaultclub-web
          envVarKey: RENDER_EXTERNAL_URL
      - key: FRONTEND_URL
        fromService:
          type: web
          name: vaultclub-web
          envVarKey: RENDER_EXTERNAL_URL
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: ALLOWED_HOSTS
        sync: false

  - type: web
    name: vaultclub-web
    runtime: node
    rootDir: frontend
    buildCommand: ./build.sh
    startCommand: npm start
    healthCheckPath: /
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: VAULTCLUB_API_HOST
        fromService:
          type: web
          name: vaultclub-api
          property: host
      # Override manually if needed (must include /api/v1); build.sh sets this from VAULTCLUB_API_HOST.
      - key: NEXT_PUBLIC_API_URL
        sync: false
