# Local development only. MVP on Render uses render.yaml (API + Postgres).
# Redis is kept for future Celery (payment-hold expiry, notifications) — not required for MVP.

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: vaultclub
      POSTGRES_PASSWORD: vaultclub
      POSTGRES_DB: vaultclub
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  # Backburner: start with `docker compose up -d redis` when adding Celery.
  redis:
    image: redis:7-alpine
    profiles:
      - celery
    ports:
      - "6379:6379"

volumes:
  pgdata:
